site_name: PySpark Learning Notes
site_description: PySpark and Databricks concepts, patterns, and case study notes from the bootcamp
site_author: Saidev Bhaskar

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Concepts:
    - Unity Catalog: concepts/unity-catalog.md
    - Data Ingestion: concepts/data-ingestion.md
    - Schema Definition: concepts/schema-definition.md
    - Data Quality & Quarantine: concepts/data-quality.md
    - PII Handling: concepts/pii-handling.md
    - Joins in PySpark: concepts/joins.md
    - Business Logic: concepts/business-logic.md
    - Wildcards: concepts/wildcards.md
    - Regex: concepts/regex.md
    - Data Masking: concepts/data-masking.md
    - Hashing & Salting: concepts/hashing.md
  - Case Studies:
    - Case Study 1 — Green Grid: case-studies/green-grid.md
    - Case Study 2 — SantéFlux: case-studies/santeflux.md
